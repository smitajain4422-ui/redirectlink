<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Redirect Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CORE MINIMALIST THEME --- */
        body { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background-color: #050505; color: #e5e5e5; overflow: hidden;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('https://media.discordapp.net/attachments/1486075241720582247/1487442277809787011/images_3.jpeg?ex=69c92812&is=69c7d692&hm=bd1358efc3cd0652cb5d6a7add4158e3b94141f950915fcc2c0a66235c421f65&') repeat; background-size: cover;
            animation: panBackground 60s linear infinite; z-index: -2; opacity: 0.1;
        }
        @keyframes panBackground { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Main Container */
        .panel {
            background: #0f0f0f; border: 1px solid #262626; border-radius: 16px;
            width: 90%; max-width: 400px; padding: 40px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            position: relative; z-index: 10;
        }

        /* Buttons */
        .btn-blue { 
            background: #2563eb; color: #fff; padding: 16px 24px; border-radius: 12px; 
            font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
            transition: 0.2s; border: none; cursor: pointer; width: 100%; display: block;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }
        .btn-blue:hover { background: #1d4ed8; transform: translateY(-2px); }
        .btn-blue:active { transform: scale(0.98); }

        .btn-dark { 
            background: #141414; color: #fff; border: 1px solid #333; padding: 16px; 
            border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; 
            width: 100%; transition: 0.2s; display: flex; justify-content: space-between; align-items: center;
            text-decoration: none;
        }
        .btn-dark:hover { border-color: #2563eb; background: #1a1a1a; transform: translateY(-2px); }
        .btn-dark:active { transform: scale(0.98); }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-card {
            background: #0f0f0f; border: 1px solid #262626; border-radius: 16px;
            width: 90%; max-width: 350px; padding: 24px;
            transform: translateY(20px); transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
        }
        .modal-overlay.active .modal-card { transform: translateY(0); }

    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <div class="panel">
        <div class="w-16 h-16 bg-blue-600/20 text-blue-500 rounded-full flex items-center justify-center mb-6 border border-blue-500/30 shadow-[0_0_15px_rgba(37,99,235,0.2)]">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
        </div>
        
        <h1 class="text-2xl font-black text-white mb-2 tracking-wide">Click Below to Redirect</h1>
        <p class="text-sm text-gray-400 mb-8 leading-relaxed">
            Select your destination below to securely access the page.
        </p>

        <button onclick="openModal()" class="btn-blue">
            Click Here
        </button>
    </div>

    <div id="link-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="flex justify-between items-center mb-6 border-b border-[#262626] pb-4">
                <h2 class="text-lg font-bold text-white">Select Destination</h2>
                <button onclick="closeModal()" class="text-gray-500 hover:text-white text-xl transition">&times;</button>
            </div>
            
            <div class="flex flex-col gap-4">
                <a href="https://donatepls.vercel.app/" target="_blank" class="btn-dark">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">💰</span>
                        <span>Free Robux</span>
                    </div>
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </a>
                
                <a href="https://sailorpiece.vercel.app/" target="_blank" class="btn-dark">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">⚓</span>
                        <span>Sailorpiece Script (no key)</span>
                    </div>
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Modal Logic
        const modal = document.getElementById('link-modal');

        function openModal() {
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // Close modal if user clicks outside the card
        modal.addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
    </html>
